name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Install dependencies
        run: pdm install -G lint

      - name: Run formatting checks
        run: pdm run lint

  build-and-smoke:
    name: Build and smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true

      - name: Install dependencies
        run: pdm install -G build -G lint -G test

      - name: Build distribution
        run: pdm run build

      - name: Run smoke tests
        run: pdm run pytest -vv --durations=10 --durations-min=0.1 -m "not integration"

  browser-integration:
    name: Browser integration (${{ matrix.os }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      NODRIVER_BROWSER_STARTUP_TIMEOUT: "60"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Install dependencies
        run: pdm install -G test

      - name: Install Chromium and Xvfb
        if: runner.os == 'Linux'
        id: chromium
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y chromium xvfb
          echo "browser-path=$(command -v chromium || command -v chromium-browser)" >> "$GITHUB_OUTPUT"

      - name: Setup Chrome stable
        if: runner.os != 'Linux'
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: false

      - name: Run browser integration tests (Linux)
        if: runner.os == 'Linux'
        env:
          NODRIVER_BROWSER_EXECUTABLE: ${{ steps.chromium.outputs.browser-path }}
        timeout-minutes: 4
        run: xvfb-run -a pdm run pytest -vv --capture=tee-sys --durations=10 --durations-min=0.1 -m integration

      - name: Run browser integration tests (macOS/Windows)
        if: runner.os != 'Linux'
        env:
          NODRIVER_BROWSER_EXECUTABLE: ${{ steps.setup-chrome.outputs.chrome-path }}
        timeout-minutes: 4
        run: pdm run pytest -vv --capture=tee-sys --durations=10 --durations-min=0.1 -m integration

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Install documentation dependencies
        run: pdm install -G docs

      - name: Build HTML docs
        run: pdm run docs-html

      - name: Build Markdown docs
        run: pdm run docs-markdown
